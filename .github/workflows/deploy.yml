name: Deploy Next.js App

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nextjs-app:latest

      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd ~/nextjs-app

            echo "=== 1. Перезаписываем docker-compose.yml ==="
            cat > docker-compose.yml << 'EOF'
            services:
              db:
                image: postgres:15-alpine
                restart: always
                environment:
                  POSTGRES_USER: iurii
                  POSTGRES_PASSWORD: q
                  POSTGRES_DB: iurii
                volumes:
                  - pgdata:/var/lib/postgresql/data
                ports:
                  - "5432:5432"
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U iurii"]
                  interval: 5s
                  timeout: 5s
                  retries: 5

              web:
                image: ghcr.io/${{ github.repository_owner }}/nextjs-app:latest
                restart: always
                ports:
                  - "3000:3000"
                env_file:
                  - .env
                depends_on:
                  db:
                    condition: service_healthy
                environment:
                  - DATABASE_URL=postgresql://iurii:q@db:5432/iurii
                command: >
                  sh -c "sleep 10 && 
                  PGPASSWORD=q psql -h db -U iurii -d iurii -c 'CREATE TABLE IF NOT EXISTS applications (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), employer TEXT, vacancy TEXT, state TEXT, date DATE);' && 
                  node server.js"

            volumes:
              pgdata:
            EOF

            echo "=== 2. Создаём .env (безопасный способ) ==="
            cat > .env << 'ENV_EOF'
            ${{ secrets.ENV_FILE }}
            ENV_EOF

            echo "=== 3. Входим в GitHub Container Registry ==="
            printf '%s' "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            echo "=== 4. Подтягиваем образ ==="
            docker pull ghcr.io/${{ github.repository_owner }}/nextjs-app:latest

            echo "=== 5. Перезапускаем ==="
            docker compose down --remove-orphans || true
            docker compose up -d --force-recreate

            echo "=== 5. Статус ==="
            docker compose ps -a
            docker compose logs web --tail=100 || true
            echo "✅ Деплой завершён!"
