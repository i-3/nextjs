name: Deploy Next.js App

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p ~/nextjs-app
            cd ~/nextjs-app

            # Создаем .env из секретов GitHub
            cat << 'EOF' > .env
            ${{ secrets.ENV_FILE }}
            EOF

            # Создаем чистый docker-compose.yml
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              db:
                image: postgres:15-alpine
                restart: always
                environment:
                  POSTGRES_USER: iurii
                  POSTGRES_PASSWORD: q
                  POSTGRES_DB: iurii
                volumes:
                  - postgres_data:/var/lib/postgresql/data

              web:
                image: ghcr.io/${{ github.repository }}:latest
                restart: always
                ports:
                  - "3000:3000"
                env_file:
                  - .env
                depends_on:
                  - db
                environment:
                  - DATABASE_URL=postgresql://iurii:q@db:5432/iurii
                command: >
                  sh -c "sleep 5 && 
                  DATABASE_URL=postgresql://iurii:q@db:5432/iurii npx prisma db push && 
                  node server.js"

            volumes:
              postgres_data:
            EOF

            docker compose pull
            docker compose up -d
            docker image prune -f
