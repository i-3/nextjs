name: Deploy Next.js App

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Не забудь: имя репозитория в теге должно быть в нижнем регистре
          tags: ghcr.io/${{ github.repository_owner }}/nextjs-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }} # Твой секрет
          username: ${{ secrets.SSH_USER }} # Твой секрет
          key: ${{ secrets.SSH_KEY }} # Твой секрет
          script: |
            cd ~/nextjs-app

            # Создаем или обновляем .env файл из твоего секрета ENV_FILE
            echo "${{ secrets.ENV_FILE }}" > .env

            # Подтягиваем свежий образ
            docker pull ghcr.io/${{ github.repository_owner }}/nextjs-app:latest

            # Перезапускаем сервисы
            docker compose down
            docker compose up -d
