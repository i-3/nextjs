name: Build and Deploy Next.js

on:
  push:
    branches: ["master"] # Скрипт сработает при пуше в ветку master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6 # Обновил до v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p ~/nextjs-app
            cd ~/nextjs-app

            # Используем одинарные кавычки для защиты содержимого секрета
            cat << 'EOF' > .env
            ${{ secrets.ENV_FILE }}
            EOF

            # Логинимся
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Остальное без изменений...
            docker pull ghcr.io/${{ github.repository }}:latest

            cat <<EOF > docker-compose.yml
            services:
              db:
                image: postgres:15-alpine
                restart: always
                environment:
                  POSTGRES_USER: iurii
                  POSTGRES_PASSWORD: q
                  POSTGRES_DB: iurii
                volumes:
                  - pgdata:/var/lib/postgresql/data
              web:
                image: ghcr.io/${{ github.repository }}:latest
                restart: always
                ports:
                  - "3000:3000"
                env_file:
                  - .env
                depends_on:
                  - db
                # Передаем DATABASE_URL напрямую в процесс npx
                command: >
                  sh -c "DATABASE_URL=postgresql://iurii:q@db:5432/iurii npx prisma db push && 
                  node server.js"
            volumes:
              pgdata:
            EOF

            docker compose up -d
            docker image prune -f
