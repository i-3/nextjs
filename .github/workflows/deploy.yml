name: Deploy Next.js App

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app:latest .

      - name: Save Docker image to tar
        run: docker save app:latest -o app.tar

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # Теперь копируем и образ, и сам файл docker-compose.yml из репозитория!
          source: "app.tar,docker-compose.yml"
          target: "~/nextjs-app/"

      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/nextjs-app

            echo "=== 1. Создаём .env из секретов ==="
            cat > .env << 'ENV_EOF'
            ${{ secrets.ENV_FILE }}
            ENV_EOF

            echo "=== 2. Загружаем свежий образ ==="
            docker load < app.tar

            echo "=== 3. Перезапускаем (используя скопированный docker-compose.yml) ==="
            docker compose down --remove-orphans || true
            docker compose up -d --force-recreate

            echo "✅ Деплой завершён!"
