name: Build and Deploy Next.js

on:
  push:
    branches: ["master"] # Скрипт сработает при пуше в ветку master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6 # Обновил до v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Создаем папку проекта, если её нет
            mkdir -p ~/nextjs-app
            cd ~/nextjs-app

            # Сохраняем переменные окружения из секретов GitHub в файл .env
            echo "${{ secrets.ENV_FILE }}" > .env

            # Логинимся в реестр GitHub на вашем сервере
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Скачиваем обновленный образ
            docker pull ghcr.io/${{ github.repository }}:latest

            # Генерируем docker-compose.yml на лету
            cat <<EOF > docker-compose.yml
            services:
              db:
                image: postgres:15-alpine
                restart: always
                environment:
                  POSTGRES_USER: iurii
                  POSTGRES_PASSWORD: q
                  POSTGRES_DB: iurii
                volumes:
                  - pgdata:/var/lib/postgresql/data
              
              web:
                image: ghcr.io/${{ github.repository }}:latest
                restart: always
                ports:
                  - "80:3000"
                env_file:
                  - .env
                depends_on:
                  - db
                command: sh -c "npx prisma db push && node server.js"

            volumes:
              pgdata:
            EOF

            # Перезапускаем проект
            docker compose up -d

            # Удаляем старые ненужные образы (чистим место на диске)
            docker image prune -f
