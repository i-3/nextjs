services:
  web:
    image: ghcr.io/${USER_OR_ORG}/nextjs-app:latest
    env_file:
      - .env  # Этот файл создается скриптом из deploy.yml
    depends_on:
      - db
    environment:
      # Это перекроет значение из .env, чтобы web видел базу внутри сети Docker
      - DATABASE_URL=postgresql://iurii:q@db:5432/iurii
    command: >
      sh -c "sleep 5 && 
      PGPASSWORD=q psql -h db -U iurii -d iurii -c 'CREATE TABLE IF NOT EXISTS applications (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), employer TEXT, vacancy TEXT, state TEXT, date DATE);' && 
      node server.js"

  web:
    build: .
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
    command: sh -c "npx prisma db push && node server.js"

volumes:
  pgdata:
