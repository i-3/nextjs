services:
  db:
    image: postgres:15-alpine
    container_name: shared-db-container
    restart: always
    network_mode: "host" # Контейнер использует порты сервера напрямую
    environment:
      POSTGRES_USER: iurii
      POSTGRES_PASSWORD: q
      POSTGRES_DB: iurii
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    image: ghcr.io/i-3/nextjs-app:latest
    restart: always
    network_mode: "host" # Теперь Next.js доступен на порту 3000 сервера
    env_file:
      - .env
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://iurii:q@127.0.0.1:5432/iurii
    command: >
      sh -c " sleep 5; PGPASSWORD=q psql -h 127.0.0.1 -U iurii -d postgres -c 'CREATE DATABASE directus;' || echo 'Database directus already exists or failed'; PGPASSWORD=q psql -h 127.0.0.1 -U iurii -d iurii -c 'CREATE TABLE IF NOT EXISTS applications (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), employer TEXT, vacancy TEXT, state TEXT, date DATE);'; node server.js "

volumes:
  pgdata:
